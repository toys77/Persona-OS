    <meta charset="UTF-8" />

    <meta
      name="description"
      content="Persona OS は、表の顔・裏の顔・地雷・扱い方まで見える化する人格診断アプリです。"
    />

    <script>
      (function () {
        var redirectPath = window.sessionStorage.getItem(
          "persona-os:redirect-path"
        );

        if (!redirectPath) {
          return;
        }

        window.sessionStorage.removeItem("persona-os:redirect-path");

        if (
          redirectPath !==
          window.location.pathname + window.location.search + window.location.hash
        ) {
          window.history.replaceState(null, "", redirectPath);
        }
      })();
    </script>
